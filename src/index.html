<style>
  #splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #F7F5F0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.8s ease-out, visibility 0.8s;
    overflow: hidden;
  }

  /* Animated background blobs */
  .splash-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    z-index: -1;
    opacity: 0.4;
    animation: blob-float 10s infinite alternate ease-in-out;
  }

  .blob-1 {
    width: 300px;
    height: 300px;
    background-color: #DDE6D1;
    top: -50px;
    right: -50px;
    animation-duration: 15s;
  }

  .blob-2 {
    width: 400px;
    height: 400px;
    background-color: #E9E6DD;
    bottom: -100px;
    left: -100px;
    animation-duration: 20s;
    animation-delay: -5s;
  }

  .blob-3 {
    width: 250px;
    height: 250px;
    background-color: #F1F3E8;
    top: 20%;
    left: -50px;
    animation-duration: 12s;
    animation-delay: -2s;
  }

  @keyframes blob-float {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -50px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
    100% { transform: translate(0, 0) scale(1); }
  }

  #splash-screen svg {
    width: 150px;
    height: 150px;
    margin-bottom: 24px;
    animation: logo-entrance 1.5s ease-out forwards, logo-pulse 3s infinite ease-in-out 1.5s;
    mix-blend-mode: multiply;
    z-index: 10;
  }

  @keyframes logo-entrance {
    0% { opacity: 0; transform: scale(0.8) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes logo-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.9; }
  }

  .splash-title {
    font-family: 'Nunito', sans-serif;
    color: #fff;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: 1px;
    background-color: #6B8F71;
    padding: 12px 24px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(107, 143, 113, 0.2);
    z-index: 10;
    animation: title-entrance 1.2s ease-out 0.3s backwards;
  }

  @keyframes title-entrance {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>

<body>
  <div id="splash-screen">
    <div class="splash-blob blob-1"></div>
    <div class="splash-blob blob-2"></div>
    <div class="splash-blob blob-3"></div>
