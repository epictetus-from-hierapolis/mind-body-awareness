<style>
  #splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #F7F5F0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s ease-out, visibility 0.5s;
  }

  #splash-screen svg {
    width: 150px;
    height: 150px;
    margin-bottom: 20px;
    animation: logo-fade 1.5s ease-in-out;
    mix-blend-mode: multiply;
  }

  @keyframes logo-fade {
    0% {
      opacity: 0;
      transform: scale(0.9);
    }

    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  .splash-title {
    font-family: 'Nunito', sans-serif;
    color: #fff;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 1px;
    background-color: #6B8F71;
    padding: 10px;
    border-radius: 5px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }
</style>
